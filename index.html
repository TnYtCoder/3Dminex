<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3Dimenx · TnYtCoder</title>
    <!-- clean, system-first typography, no external font assets -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            overflow: hidden;
            background: #111;
            color: #eee;
        }

        /* main canvas fills viewport */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* floating UI panel — glass, responsive, non-intrusive */
        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 340px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 40px);
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            padding: 20px 18px;
            overflow-y: auto;
            z-index: 10;
            color: #f0f0f0;
            transition: all 0.2s ease;
            scrollbar-width: thin;
            scrollbar-color: #555 #222;
        }

        .control-panel::-webkit-scrollbar {
            width: 6px;
        }
        .control-panel::-webkit-scrollbar-track {
            background: #222;
            border-radius: 10px;
        }
        .control-panel::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 10px;
        }

        /* header with brand and github */
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .brand h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #b0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .brand .author {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-top: 2px;
            letter-spacing: 1px;
        }
        .github-icon a {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .github-icon a:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }
        .github-icon svg {
            width: 26px;
            height: 26px;
            fill: #fff;
        }

        /* section styles */
        .section {
            background: rgba(0,0,0,0.25);
            border-radius: 18px;
            padding: 16px 14px;
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .section-title {
            font-size: 1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
            color: #b0b0ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title svg {
            width: 18px;
            height: 18px;
            fill: #b0b0ff;
        }

        /* upload areas */
        .upload-area {
            background: rgba(10,10,20,0.6);
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            margin-bottom: 12px;
            transition: border 0.2s;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #7a7aff;
        }
        .upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #ccc;
            cursor: pointer;
        }
        .upload-label input {
            display: none;
        }
        .file-hint {
            font-size: 0.7rem;
            opacity: 0.5;
            margin-top: 6px;
        }
        .limit-badge {
            background: #2a2a3a;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 6px;
        }

        /* slider groups */
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .control-row label {
            width: 40px;
            opacity: 0.7;
        }
        .control-row input[type="range"] {
            flex: 1;
            margin: 0 8px;
            background: transparent;
            accent-color: #8a8aff;
        }
        .control-row .value-display {
            width: 35px;
            text-align: right;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .color-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .color-row span {
            width: 60px;
            font-size: 0.85rem;
        }
        .color-row input[type="color"] {
            width: 40px;
            height: 30px;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0 8px;
            font-size: 0.9rem;
        }
        .checkbox-row input {
            accent-color: #8a8aff;
            width: 18px;
            height: 18px;
        }

        .button {
            background: #3a3a5a;
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: 0.15s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .button:hover {
            background: #4f4f7a;
        }

        .status-msg {
            font-size: 0.75rem;
            margin-top: 6px;
            color: #9e9eff;
            word-break: break-word;
        }

        /* responsive: on small screens move panel to bottom */
        @media (max-width: 640px) {
            .control-panel {
                top: auto;
                bottom: 10px;
                right: 10px;
                left: 10px;
                width: auto;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- UI panel -->
    <div class="control-panel">
        <div class="panel-header">
            <div class="brand">
                <h1>3Dimenx</h1>
                <div class="author">by TnYtCoder</div>
            </div>
            <div class="github-icon">
                <a href="https://github.com/TnYtCoder" target="_blank" rel="noopener" aria-label="GitHub">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                    </svg>
                </a>
            </div>
        </div>

        <!-- upload model -->
        <div class="section">
            <div class="section-title">
                <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                <span>UPLOAD MODEL</span>
            </div>
            <div class="upload-area" id="model-upload-area">
                <label class="upload-label">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#ccc"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
                    <span>Choose or drag .glb, .obj, .stl</span>
                    <input type="file" id="model-file" accept=".glb,.gltf,.obj,.stl,.GLB,.GLTF,.OBJ,.STL">
                </label>
                <div class="limit-badge">Max size: 100 MB</div>
                <div class="file-hint">single-file only (embedded textures recommended)</div>
            </div>
            <div id="model-status" class="status-msg">No model loaded</div>
        </div>

        <!-- upload HDRI -->
        <div class="section">
            <div class="section-title">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6z"/></svg>
                <span>HDRI ENVIRONMENT</span>
            </div>
            <div class="upload-area">
                <label class="upload-label">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="#ccc"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM9 8h2v8H9zm4 0h2v8h-2z"/></svg>
                    <span>Upload .hdr file</span>
                    <input type="file" id="hdri-file" accept=".hdr,.HDR">
                </label>
            </div>
            <div id="hdri-status" class="status-msg">default procedural</div>
            <button class="button" id="clear-hdri" style="margin-top:8px;">clear HDRI (set gray)</button>
        </div>

        <!-- transform controls (enabled only when model loaded) -->
        <div class="section" id="transform-section">
            <div class="section-title">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zm0 7L4 7l8-4 8 4-8 4zm0 7l-8-4 8-4 8 4-8 4zm0 7l-8-4 8-4 8 4-8 4z"/></svg>
                <span>TRANSFORM</span>
            </div>
            <div class="control-row">
                <label>X</label><input type="range" id="pos-x" min="-5" max="5" step="0.01" value="0"><span id="pos-x-val" class="value-display">0.00</span>
            </div>
            <div class="control-row">
                <label>Y</label><input type="range" id="pos-y" min="-5" max="5" step="0.01" value="0"><span id="pos-y-val" class="value-display">0.00</span>
            </div>
            <div class="control-row">
                <label>Z</label><input type="range" id="pos-z" min="-5" max="5" step="0.01" value="0"><span id="pos-z-val" class="value-display">0.00</span>
            </div>
            <div class="control-row">
                <label>Rot X</label><input type="range" id="rot-x" min="-180" max="180" step="0.5" value="0"><span id="rot-x-val" class="value-display">0°</span>
            </div>
            <div class="control-row">
                <label>Rot Y</label><input type="range" id="rot-y" min="-180" max="180" step="0.5" value="0"><span id="rot-y-val" class="value-display">0°</span>
            </div>
            <div class="control-row">
                <label>Rot Z</label><input type="range" id="rot-z" min="-180" max="180" step="0.5" value="0"><span id="rot-z-val" class="value-display">0°</span>
            </div>
            <div class="control-row">
                <label>Scale</label><input type="range" id="scale-u" min="0.1" max="5" step="0.01" value="1"><span id="scale-u-val" class="value-display">1.00</span>
            </div>
        </div>

        <!-- lighting controls -->
        <div class="section">
            <div class="section-title">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-.5-13v4h5v-4h-5zm0 6v4h5v-4h-5zM7 12h2v5H7z"/></svg>
                <span>LIGHTING</span>
            </div>
            <div class="color-row"><span>Ambient</span><input type="color" id="amb-color" value="#ffffff"><input type="range" id="amb-int" min="0" max="2" step="0.05" value="0.8"><span id="amb-int-val">0.8</span></div>
            <div class="color-row"><span>Dir 1</span><input type="color" id="dir1-color" value="#ffffff"><input type="range" id="dir1-int" min="0" max="2" step="0.05" value="1.0"><span id="dir1-int-val">1.0</span></div>
            <div class="color-row"><span>Dir 2</span><input type="color" id="dir2-color" value="#ccaaff"><input type="range" id="dir2-int" min="0" max="2" step="0.05" value="0.6"><span id="dir2-int-val">0.6</span></div>
        </div>

        <!-- extra toggles -->
        <div class="section">
            <div class="checkbox-row">
                <input type="checkbox" id="show-grid" checked> <label>Show Grid</label>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="show-axes" checked> <label>Show Axes</label>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="wireframe"> <label>Wireframe (model)</label>
            </div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="button" id="reset-view">Reset camera</button>
                <button class="button" id="reset-model">Reset transform</button>
            </div>
        </div>
    </div>

    <!-- import map and three.js module script -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        // --- setup scene, camera, renderer ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x11151f);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;
        controls.maxDistance = 30;

        // --- helpers (grid & axes) ---
        const gridHelper = new THREE.GridHelper(20, 20, 0x8888ff, 0x333344);
        gridHelper.visible = true;
        scene.add(gridHelper);
        const axesHelper = new THREE.AxesHelper(3);
        axesHelper.visible = true;
        scene.add(axesHelper);

        // --- core lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight1.position.set(2, 5, 3);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffccaa, 0.6);
        dirLight2.position.set(-3, 2, 4);
        scene.add(dirLight2);

        // point light fill (optional)
        const fillLight = new THREE.PointLight(0x4466aa, 0.5);
        fillLight.position.set(1, 2, 4);
        scene.add(fillLight);

        // group that holds the current model
        const modelGroup = new THREE.Group();
        scene.add(modelGroup);

        // state
        let currentModel = null; // reference to the group (or model)
        let envMapTexture = null;

        // --- UI elements ---
        const modelInput = document.getElementById('model-file');
        const hdriInput = document.getElementById('hdri-file');
        const modelStatus = document.getElementById('model-status');
        const hdriStatus = document.getElementById('hdri-status');
        const clearHdriBtn = document.getElementById('clear-hdri');
        
        // transform sliders
        const posX = document.getElementById('pos-x');
        const posY = document.getElementById('pos-y');
        const posZ = document.getElementById('pos-z');
        const rotX = document.getElementById('rot-x');
        const rotY = document.getElementById('rot-y');
        const rotZ = document.getElementById('rot-z');
        const scaleU = document.getElementById('scale-u');
        
        // display spans
        const posXval = document.getElementById('pos-x-val');
        const posYval = document.getElementById('pos-y-val');
        const posZval = document.getElementById('pos-z-val');
        const rotXval = document.getElementById('rot-x-val');
        const rotYval = document.getElementById('rot-y-val');
        const rotZval = document.getElementById('rot-z-val');
        const scaleUval = document.getElementById('scale-u-val');

        // lighting controls
        const ambColor = document.getElementById('amb-color');
        const ambInt = document.getElementById('amb-int');
        const ambIntVal = document.getElementById('amb-int-val');
        const dir1Color = document.getElementById('dir1-color');
        const dir1Int = document.getElementById('dir1-int');
        const dir1IntVal = document.getElementById('dir1-int-val');
        const dir2Color = document.getElementById('dir2-color');
        const dir2Int = document.getElementById('dir2-int');
        const dir2IntVal = document.getElementById('dir2-int-val');

        // checkboxes
        const gridCheck = document.getElementById('show-grid');
        const axesCheck = document.getElementById('show-axes');
        const wireframeCheck = document.getElementById('wireframe');

        // buttons
        const resetViewBtn = document.getElementById('reset-view');
        const resetModelBtn = document.getElementById('reset-model');

        // --- file size limit (100 MB) ---
        const MAX_MODEL_SIZE = 100 * 1024 * 1024;

        // --- helper: center model (bounding box) ---
        function centerModel(obj) {
            const box = new THREE.Box3().setFromObject(obj);
            const center = box.getCenter(new THREE.Vector3());
            obj.position.sub(center); // move so center is at origin
        }

        // --- model upload handler ---
        modelInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > MAX_MODEL_SIZE) {
                alert(`Model file too large. Limit is 100MB. (${(file.size / 1e6).toFixed(1)} MB)`);
                modelInput.value = '';
                return;
            }

            modelStatus.textContent = `loading ${file.name}...`;
            
            const ext = file.name.split('.').pop().toLowerCase();
            const url = URL.createObjectURL(file);

            const loader = getLoader(ext);
            if (!loader) {
                modelStatus.textContent = '❌ unsupported format';
                return;
            }

            loader.load(url, 
                (obj) => {
                    // clear previous model
                    while(modelGroup.children.length) {
                        modelGroup.remove(modelGroup.children[0]);
                    }

                    let modelObject;

                    // handle different loader result types
                    if (ext === 'glb' || ext === 'gltf') {
                        // GLTFLoader returns an object with .scene
                        modelObject = obj.scene || obj;
                    } else if (ext === 'obj') {
                        // OBJLoader returns a Group
                        modelObject = obj;
                    } else if (ext === 'stl') {
                        // STLLoader returns BufferGeometry
                        const geometry = obj;
                        const material = new THREE.MeshStandardMaterial({ color: 0xcccccc, flatShading: false, roughness: 0.4, metalness: 0.1 });
                        const mesh = new THREE.Mesh(geometry, material);
                        // STL has no material info, so we create a default one
                        modelObject = mesh;
                    } else {
                        modelStatus.textContent = '❌ format error';
                        return;
                    }

                    // center the model so it appears at origin
                    centerModel(modelObject);

                    modelGroup.add(modelObject);
                    currentModel = modelGroup; // we transform the group

                    // reset transform sliders to match model (0,0,0 / 1)
                    posX.value = 0; posY.value = 0; posZ.value = 0;
                    rotX.value = 0; rotY.value = 0; rotZ.value = 0;
                    scaleU.value = 1;
                    updateTransformDisplay();
                    applyTransform();

                    modelStatus.textContent = `✅ loaded: ${file.name}`;
                    URL.revokeObjectURL(url);

                    // apply wireframe state to all meshes
                    applyWireframe(wireframeCheck.checked);
                },
                (xhr) => {
                    // progress
                    const pct = Math.floor(xhr.loaded / xhr.total * 100);
                    modelStatus.textContent = `loading... ${pct}%`;
                },
                (err) => {
                    modelStatus.textContent = '❌ load error';
                    console.error(err);
                }
            );
        });

        function getLoader(ext) {
            if (ext === 'glb' || ext === 'gltf') return new GLTFLoader();
            if (ext === 'obj') return new OBJLoader();
            if (ext === 'stl') return new STLLoader();
            return null;
        }

        // --- HDRI handling ---
        hdriInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file || !file.name.toLowerCase().endsWith('.hdr')) {
                hdriStatus.textContent = 'please select .hdr file';
                return;
            }

            const url = URL.createObjectURL(file);
            new RGBELoader().load(url, (texture) => {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.environment = texture;
                scene.background = texture;
                if (envMapTexture) envMapTexture.dispose();
                envMapTexture = texture;
                hdriStatus.textContent = `HDRI: ${file.name}`;
                URL.revokeObjectURL(url);
            }, undefined, (err) => {
                hdriStatus.textContent = 'HDRI load failed';
                console.error(err);
            });
        });

        clearHdriBtn.addEventListener('click', () => {
            scene.environment = null;
            scene.background = new THREE.Color(0x11151f);
            hdriStatus.textContent = 'default gray';
            hdriInput.value = '';
        });

        // --- transform UI updates ---
        function updateTransformDisplay() {
            posXval.textContent = posX.valueAsNumber.toFixed(2);
            posYval.textContent = posY.valueAsNumber.toFixed(2);
            posZval.textContent = posZ.valueAsNumber.toFixed(2);
            rotXval.textContent = rotX.value + '°';
            rotYval.textContent = rotY.value + '°';
            rotZval.textContent = rotZ.value + '°';
            scaleUval.textContent = scaleU.valueAsNumber.toFixed(2);
        }

        function applyTransform() {
            if (!currentModel) return;
            currentModel.position.set(posX.valueAsNumber, posY.valueAsNumber, posZ.valueAsNumber);
            currentModel.rotation.set(THREE.MathUtils.degToRad(rotX.valueAsNumber), THREE.MathUtils.degToRad(rotY.valueAsNumber), THREE.MathUtils.degToRad(rotZ.valueAsNumber));
            currentModel.scale.set(scaleU.valueAsNumber, scaleU.valueAsNumber, scaleU.valueAsNumber);
        }

        [posX, posY, posZ, rotX, rotY, rotZ, scaleU].forEach(s => {
            s.addEventListener('input', () => {
                updateTransformDisplay();
                applyTransform();
            });
        });

        // --- lighting listeners (FIXED: use dirLight2 instead of undefined dir2Light) ---
        function updateLights() {
            ambientLight.color.set(ambColor.value);
            ambientLight.intensity = ambInt.valueAsNumber;
            ambIntVal.textContent = ambInt.valueAsNumber.toFixed(2);

            dirLight1.color.set(dir1Color.value);
            dirLight1.intensity = dir1Int.valueAsNumber;
            dir1IntVal.textContent = dir1Int.valueAsNumber.toFixed(2);

            dirLight2.color.set(dir2Color.value);
            dirLight2.intensity = dir2Int.valueAsNumber;
            dir2IntVal.textContent = dir2Int.valueAsNumber.toFixed(2);
        }
        ambColor.addEventListener('input', updateLights);
        ambInt.addEventListener('input', updateLights);
        dir1Color.addEventListener('input', updateLights);
        dir1Int.addEventListener('input', updateLights);
        dir2Color.addEventListener('input', updateLights);
        dir2Int.addEventListener('input', updateLights);
        updateLights(); // init

        // helpers toggle
        gridCheck.addEventListener('change', (e) => gridHelper.visible = e.target.checked);
        axesCheck.addEventListener('change', (e) => axesHelper.visible = e.target.checked);

        // wireframe toggle (apply to all meshes of current model recursively)
        function applyWireframe(enabled) {
            if (!currentModel) return;
            currentModel.traverse((obj) => {
                if (obj.isMesh && obj.material) {
                    const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
                    materials.forEach(mat => mat.wireframe = enabled);
                }
            });
        }
        wireframeCheck.addEventListener('change', (e) => applyWireframe(e.target.checked));

        // reset buttons
        resetViewBtn.addEventListener('click', () => {
            camera.position.set(4, 3, 6);
            controls.target.set(0, 0, 0);
            controls.update();
        });
        resetModelBtn.addEventListener('click', () => {
            if (!currentModel) return;
            posX.value = 0; posY.value = 0; posZ.value = 0;
            rotX.value = 0; rotY.value = 0; rotZ.value = 0;
            scaleU.value = 1;
            updateTransformDisplay();
            applyTransform();
        });

        // --- drag & drop for model (simple) ---
        const modelArea = document.getElementById('model-upload-area');
        modelArea.addEventListener('dragover', (e) => { e.preventDefault(); modelArea.style.borderColor = '#7a7aff'; });
        modelArea.addEventListener('dragleave', () => { modelArea.style.borderColor = 'rgba(255,255,255,0.2)'; });
        modelArea.addEventListener('drop', (e) => {
            e.preventDefault();
            modelArea.style.borderColor = 'rgba(255,255,255,0.2)';
            const file = e.dataTransfer.files[0];
            if (file) {
                modelInput.files = e.dataTransfer.files;
                modelInput.dispatchEvent(new Event('change'));
            }
        });

        // --- animation loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // resize handler
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
